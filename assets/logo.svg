<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#005a9e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="72" ry="72" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- SharePoint-style circle (top-left accent) -->
  <circle cx="172" cy="180" r="60" fill="#ffffff" opacity="0.15"/>
  <circle cx="172" cy="180" r="40" fill="#ffffff" opacity="0.1"/>

  <!-- Download arrow -->
  <g transform="translate(256, 240)">
    <!-- Arrow shaft -->
    <rect x="-32" y="-100" width="64" height="140" rx="8" fill="url(#arrow)"/>
    <!-- Arrow head (triangle) -->
    <polygon points="-70,40 0,110 70,40" fill="url(#arrow)"/>
  </g>

  <!-- Tray / base line -->
  <path d="M 140 340 L 140 370 Q 140 390 160 390 L 352 390 Q 372 390 372 370 L 372 340"
        fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "SP" text badge (top-right) -->
  <rect x="310" y="100" width="90" height="44" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="355" y="130" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="800" fill="#0078d4" text-anchor="middle" dominant-baseline="central">SP</text>
</svg>
